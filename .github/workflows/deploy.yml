# push 到 main 时自动部署到 GCP VM
# 需在 GitHub 仓库 Settings → Secrets 添加：GCP_SA_KEY（服务账号 JSON 内容）

name: Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: seventh-chassis-490115-u3

      - name: Deploy to VM
        env:
          GCP_PROJECT: seventh-chassis-490115-u3
          GCP_ZONE: asia-east1-b
          GCP_INSTANCE: lark-bot-vm
        run: |
          chmod +x scripts/deploy_to_gcp.sh
          ./scripts/deploy_to_gcp.sh
